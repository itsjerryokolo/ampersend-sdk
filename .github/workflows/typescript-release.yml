name: TypeScript Release

on:
  push:
    tags:
      - "ts-v*.*.*"
      - "ts-v*.*.*-alpha.*"
      - "ts-v*.*.*-beta.*"

permissions:
  contents: read
  id-token: write # Required for npm provenance

env:
  NODE_VERSION: "22.22.1"

jobs:
  verify-version:
    name: "ts: verify version"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/ts-v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Tagged version: $TAG"

      - name: Read package.json version
        id: package
        run: |
          VERSION=$(node -p "require('./typescript/packages/ampersend-sdk/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Compare versions
        run: |
          if [ "${{ steps.tag.outputs.version }}" != "${{ steps.package.outputs.version }}" ]; then
            echo "ERROR: Tag version (${{ steps.tag.outputs.version }}) does not match package.json version (${{ steps.package.outputs.version }})"
            exit 1
          fi
          echo "✓ Versions match: ${{ steps.tag.outputs.version }}"

  publish:
    name: "ts: publish to npm"
    runs-on: ubuntu-latest
    needs: verify-version
    environment:
      name: npm
      url: https://www.npmjs.com/package/@ampersend_ai/ampersend-sdk
    permissions:
      id-token: write # Required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter ampersend-sdk build

      - name: Determine publish tag
        id: publish-tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/ts-v}"
          if [[ "$VERSION" == *"-alpha."* ]]; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
            echo "Publishing with tag: alpha"
          elif [[ "$VERSION" == *"-beta."* ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
            echo "Publishing with tag: beta"
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "Publishing with tag: latest"
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ steps.publish-tag.outputs.tag }}
        working-directory: typescript/packages/ampersend-sdk

  # Skill installs use `npx skills add edgeandnode/ampersend-sdk#skills/latest`. Moving this branch on every stable
  # release is what makes `#skills/latest` step-function forward instead of tracking `main`. Alpha/beta releases skip
  # this (the `if` below) so `#skills/latest` only ever points at a stable build.
  #
  # This runs as its own job rather than a step in `publish` on purpose: the `skills/latest` branch is protected by a
  # ruleset requiring an active `npm` environment deployment on the pushed commit. That deployment only flips from
  # `in_progress` to `success` once the `publish` job *finishes*, so a push from inside `publish` always raced its own
  # deployment and was rejected ("Missing successful active npm deployment"). Gating on `needs: publish` guarantees the
  # deployment is active before we push. This job deliberately omits an `environment:` block so it does not open a
  # second, in-progress `npm` deployment and re-introduce the same race.
  move-skills-latest:
    name: "ts: move skills/latest"
    runs-on: ubuntu-latest
    needs: publish
    # Stable releases only. A stable tag is `ts-vX.Y.Z`; every pre-release tag
    # (-alpha., -beta., a future -rc., ...) carries a `-` suffix, so this skips
    # them all without enumerating channels.
    if: ${{ startsWith(github.ref, 'refs/tags/ts-v') && !contains(github.ref, '-') }}
    permissions:
      contents: write # Required to move the `skills/latest` branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Move `skills/latest` branch to release commit
        run: |
          git push origin "$GITHUB_SHA:refs/heads/skills/latest"
